<!DOCTYPE html>

 <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/Images/icons/RAAT192.png">
    <script>
      if ('serviceWorker' in navigator) {
        const localHosts = ['localhost', '127.0.0.1', '0.0.0.0', '::1'];
        const isLocal = localHosts.includes(location.hostname) || location.hostname.startsWith('192.168.') || location.hostname.startsWith('10.') || location.hostname.startsWith('172.');
        if (isLocal) {
          navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(reg => reg.unregister()));
        } else {
          navigator.serviceWorker.register('sw.js');
        }
      }
    </script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{width:100%;height:100%;overflow:hidden;}
body{
  width:100%;height:100%;font-family:'Press Start 2P',monospace;color:#0835d8;touch-action:none;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;padding:8px;
  background-image:url('./assets/Images/background.png');
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  background-color:#ffffff;
  overflow:hidden;
}

#app-container {
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:6px;width:100%;max-width:480px;height:100%;
}

.box{
  background:#af0000;
  border:3px solid #e7a2f0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;position:relative;z-index:2;
  width:100%;
}

/* BOX 1 — music */
#box-music{width:100%;height:120px;}
#box-music iframe{width:100%;height:100%;border:0;display:block;}

/* BOX 2 — model */
#box-model{position:relative;width:100%;flex:1;padding:6px;min-height:0;background:rgba(78,48,182,0.7);display:flex;flex-direction:row;align-items:center;justify-content:center;gap:clamp(6px,2.5vw,12px);overflow:visible;}
#target-grid{display:grid;gap:3px;flex-shrink:0;}
.tc{display:flex;align-items:center;justify-content:center;background:#a8e0e6;border:1px solid #8661a9;}
.tc.et{background:#9de5f3;border:1px dashed #8661a9;}
#model-left-marker,#model-right-marker{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;flex-shrink:0;min-width:clamp(44px,10vw,60px);width:clamp(44px,10vw,60px);background:rgba(134,97,169,0.4);border:2px solid #8661a9;padding:6px 3px;border-radius:2px;}
.marker-label{font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.6vw,7px);color:#a8e0e6;text-align:center;white-space:nowrap;font-weight:600;letter-spacing:0.5px;display:none;}
.marker-value{font-family:'Press Start 2P',monospace;font-size:clamp(11px,3.5vw,15px);color:#ffffff;text-align:center;font-weight:700;text-shadow:0 0 8px rgba(78,48,182,0.5);min-width:100%;}

/* BOX 3 — buttons */
#box-buttons{width:100%;display:flex;flex-direction:row;gap:8px;padding:6px;align-items:center;justify-content:center;flex-shrink:0;background:rgba(28,14,24,.75);}
#btn-info,#btn-shuffle{font-size:clamp(7px,3vw,11px);padding:4px 8px;flex:1;}
#btn-info{background:rgba(28,14,24,.75);border-color:#9de5f3;}
#level-display{text-align:center;border:2px solid #9de5f3;padding:4px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:36px;background:rgba(28,14,24,.75);color:#ffffff;box-shadow:2px 2px 0 #9de5f3;}
#level-display span{font-family:'Press Start 2P',monospace;font-size:clamp(8px,3vw,12px);color:#a8e0e6;white-space:nowrap;}

/* BOX 3 — tiles */
#box-grid{width:100%;background:rgba(78,48,182,0.7);}
#grid{display:grid;gap:3px;grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);}
.cell{display:flex;align-items:center;justify-content:center;background:#9de5f3;border:2px dashed #8661a9;}
.tile{width:100%;height:100%;background:#9de5f3;border:2px solid #8661a9;cursor:pointer;box-shadow:4px 4px 12px rgba(157,229,243,0.9);}
.tile img{width:100%;height:100%;object-fit:contain;display:block;}
.tile:active{transform:scale(.9);border-color:#089ad8;box-shadow:none;}
.hint{border-color:#3402da!important;box-shadow:0 0 8px #4e30b6;}

/* ── INFO OVERLAY ── */
#info-overlay{
  display:flex;position:fixed;inset:0;z-index:9999;pointer-events:auto;
  background:rgba(129, 86, 203, 0.277);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 clamp(12px,5vw,60px);
}
#info-inner{
  max-width:clamp(320px,90vw,600px);margin:0 auto;min-height:100%;
  display:flex;flex-direction:column;align-items:stretch;
  justify-content:center;gap:12px;
  padding:clamp(16px,8vh,32px) 0;
}
.info-album{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(7px,4vw,13px);color:#e7a2f0;letter-spacing:1.5px;
  text-shadow:0 0 20px rgba(129, 86, 203, 0.605);
  text-align:center;text-transform:uppercase;
  line-height:1.4;
}
#win-album-title{display:none;}
.info-box{
  background:rgba(28,14,24,.75);
  border:2px solid #e7a2f0;
  padding:clamp(10px,3vh,16px) clamp(10px,3vw,16px);
  display:flex;flex-direction:column;gap:clamp(4px,1.5vh,8px);
  backdrop-filter:blur(2px);
  flex:1;
}
.info-box-instructions{
  border-color:#e7a2f0;
  background:#8157a8;
  gap:clamp(4px,1.2vh,6px);
}
.info-how-to-play{
  font-family:'Press Start 2P',monospace;
  font-size:clamp(9px,3.2vw,12px);color:#ffdafb;
  text-align:justify;letter-spacing:0.5px;line-height:1.5;
  border-top:2px solid #e7a2f0;padding-top:clamp(6px,1.5vh,10px);
}
.info-instructions{
  font-family:'Nunito',sans-serif;
  font-weight:600;
  font-size:clamp(9px,3.2vw,17px);color:#ffdafb;
  text-align:justify;line-height:1.8;
  white-space:normal;
}
.info-box-buttons{
  border-color:#e7a2f0;
  background:rgba(28,14,24,.75);
  flex-direction:row;gap:clamp(6px,1.5vw,10px);align-items:center;justify-content:center;
  flex-wrap:wrap;
  flex:none;
}
.info-box-buttons button{
  flex:1;max-width:clamp(100px,20vw,180px);min-width:80px;min-height:36px;font-size:clamp(6px,2.5vw,13px);
}
.info-box-buttons .info-credits,
.info-box-buttons a{
  width:100%;text-align:center;
}
.info-box a{
  font-family:'Nunito',sans-serif;
  font-weight:600;
  font-size:clamp(9px,3.2vw,17px);color:#a8e0e6;
  text-decoration:none;letter-spacing:0;
  border-bottom:1px solid rgba(96,197,205,.35);padding-bottom:2px;
  line-height:1.8;text-align:center;display:block;
}
.info-box a:hover{color:#fff;border-color:#fff;}
.info-box-lore{
  background:#8157a8;
  border-color:#e7a2f0;
  flex:1;
  display:flex;flex-direction:column;justify-content:center;gap:clamp(2px,0.8vh,4px);
}
.info-lore-1{
  font-family:'Nunito',sans-serif;
  font-weight:700;
  font-size:clamp(9px,2.7vw,15px);color:#ffdafb;
  letter-spacing:0px;text-align:center;line-height:1.5;
  white-space:nowrap;padding:0 clamp(6px,3vw,14px);overflow:hidden;text-overflow:ellipsis;
}
.info-lore-2{
  font-family:'Nunito',sans-serif;
  font-weight:600;
  color:#ffdafb;font-size:clamp(9px,3.2vw,17px);line-height:1.8;
  text-align:justify;word-spacing:0;white-space:normal;
}
.info-lore-3{
  font-family:'Nunito',sans-serif;
  font-weight:600;
  color:#ffdafb;font-size:clamp(9px,3.2vw,17px);line-height:1.8;
  text-align:justify;
}
.info-credits{
  font-family:'Nunito',sans-serif;
  font-weight:600;
  font-size:clamp(9px,3.2vw,17px);color:#e7a2f0;
  text-align:center;line-height:1.8;
  letter-spacing:0;border-top:1px solid #e7a2f0;border-bottom:1px solid #e7a2f0;padding:6px 0;
}

#mv{color:#1a0a14;}
button{font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.8vw,7px);padding:7px 10px;background:rgba(28,14,24,.75);color:#ffffff;border:2px solid #9de5f3;cursor:pointer;box-shadow:2px 2px 0 #4e30b6;min-height:36px;}
button:active{transform:translateY(2px);box-shadow:none;}

#btn-lang-info, #btn-win-lang {
  animation: subtle-blink 2s ease-in-out infinite;
}

/* PIXEL SEED */
#pixel-seed-container{display:none!important;position:absolute;z-index:100;top:0;right:0;bottom:0;left:0;flex-direction:column;align-items:center;justify-content:center;}
/* FIX: div imagen ocupa el espacio disponible sin desbordar */
#pixel-seed-container .npc-img-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;}
.seed{
  /* FIX: fill the available flex space, not a fixed clamp */
  width:100%; height:100%;
  max-width:min(40vw, 100%);
  max-height:100%;
  transform:translateZ(0);-webkit-font-smoothing:antialiased;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  animation:seed-blink 1.5s step-start infinite;
  background-image:url('assets/Images/npc/seed1.png');
}
.seed-text{flex-shrink:0;display:block;font-family:'Press Start 2P',monospace;font-size:clamp(7px,1.8vw,10px);color:#fff;text-align:center;letter-spacing:0.5px;padding:0 8px 8px;line-height:1.3;white-space:nowrap;}
@keyframes seed-blink { 
  0% { background-image:url('assets/Images/npc/seed1.png'); } 
  33% { background-image:url('assets/Images/npc/seed2.png'); } 
  66% { background-image:url('assets/Images/npc/seed3.png'); } 
  100% { background-image:url('assets/Images/npc/seed1.png'); } 
}
@keyframes blink{0%,90%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}
@keyframes wag{0%{transform:translateY(0);}100%{transform:translateY(calc(var(--pixel-size,4px)*-1)) translateX(calc(var(--pixel-size,4px)*1));}}

/* LANGUAGE BUTTON BLINK */
@keyframes subtle-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
#ghost-container{display:none!important;position:absolute;z-index:100;top:0;right:0;bottom:0;left:0;flex-direction:column;align-items:center;}
/* FIX: div imagen ocupa espacio flex sin desbordar */
#ghost-container .npc-img-wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;}
.pixel-ghost {
  /* FIX: fill available space with contain, no clamp fijo */
  width:100%; height:100%;
  max-width:min(40vw, 100%);
  max-height:100%;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  animation: ghost-blink 1.5s step-start infinite;
  background-image: url('assets/Images/npc/ghost1.png');
}
@keyframes ghost-blink {
  0%   { background-image: url('assets/Images/npc/ghost1.png'); }
  33%  { background-image: url('assets/Images/npc/ghost2.png'); }
  66%  { background-image: url('assets/Images/npc/ghost3.png'); }
  100% { background-image: url('assets/Images/npc/ghost1.png'); }
}

#win{display:none;position:fixed;inset:0;background:rgba(28,14,24,.85);flex-direction:column;align-items:center;justify-content:center;gap:0;z-index:99;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px;}
#win.on{display:flex;}
#win-inner{max-width:340px;width:100%;margin:0 auto;display:flex;flex-direction:column;align-items:stretch;gap:14px;padding:32px 0;text-align:center;min-height:100%;justify-content:center;}
#win-album-img{width:100%;max-width:220px;margin:0 auto;display:block;border:3px solid #e7a2f0;box-shadow:4px 4px 0 #4e30b6;}
#win-title-row{display:flex;align-items:center;justify-content:center;gap:12px;}
#win-icon{flex-shrink:0;}
#win-song{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.2vw,10px);color:#ba67a6;letter-spacing:1px;text-align:center;line-height:1.4;}
#win-quote-box{background:rgba(28,14,24,.65);border:2px solid #e7a2f0;padding:16px;display:flex;flex-direction:column;gap:12px;backdrop-filter:blur(3px);box-shadow:4px 4px 0 #4e30b6;}
#win-quote{font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,9px);color:#d48fc4;line-height:1.8;text-align:center;}
#win-author{font-family:'Press Start 2P',monospace;font-size:clamp(6px,2vw,8px);color:#60c5cd;text-align:center;line-height:1.6;}
#win-stats{display:flex;gap:8px;justify-content:center;align-items:stretch;}
.win-stat{font-family:'Press Start 2P',monospace;background:rgba(28,14,24,.65);border:2px solid #e7a2f0;padding:8px 12px;flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;backdrop-filter:blur(3px);box-shadow:4px 4px 0 #4e30b6;}
.win-stat-label{font-size:clamp(5px,1.8vw,7px);color:#8661a9;}
.win-stat-val{font-size:clamp(14px,5vw,22px);color:#ba67a6;}
.win-stat-val.best{color:#60c5cd;}
#win-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
#win-final{font-family:'Press Start 2P',monospace;font-size:clamp(7px,2vw,9px);color:#089ad8;line-height:1.8;background:rgba(28,14,24,.65);border:2px solid #e7a2f0;padding:16px;text-align:center;display:none;backdrop-filter:blur(3px);box-shadow:4px 4px 0 #4e30b6;}
#win-final.on{display:block;}

/* LEVEL 7 THEME - Inverted Colors */
#box-model.level7-theme, #grid.level7-theme, #target-grid.level7-theme {
  filter: invert(1);
}

/* LEVEL 8 THEME - Grayscale */
#box-model.level8-theme, #grid.level8-theme, #target-grid.level8-theme {
  filter: grayscale(100%);
}

  /* ── INSTALL SCREEN ── */
  #install-screen {

    flex-direction: column;

  #btn-enter {

  }

  }

</style>
</head>

<div id="app-container">
  <!-- INSTALL SCREEN -->

<div class="box" id="box-music" style="display:none;">

const LEVELS=[
  {song_en:"DEODATA", song_es:"LO DADO POR LO DIVINO", icon:'luna',  author:"Mary Shelley",
   es:"Cada final abre un nuevo comienzo.",

  {song_en:"GIVE ME MORE", song_es:"DAME MÁS", icon:'fuego', author:"Robert Louis Stevenson",

   en:"It is not what we have, but what we enjoy, that constitutes our abundance."},
  {song_en:"LONELY", song_es:"SOLITARIO", icon:'estrella',   author:"Ray Bradbury",
   es:"A veces necesitas estar solo para escuchar de verdad tus propios pensamientos.",
   en:"Sometimes you have to be alone to really hear your own thoughts."},
  {song_en:"WALL OF LOVE", song_es:"MURO DE AMOR", icon:'corazon',     author:"Arthur Conan Doyle",

// 8 icons in order, same for every level
const ICON_KEYS=['luna','fuego','estrella','corazon','union','planeta','arbol','universo'];
const SZ=3; // 3x3 = 8 tiles + 1 empty
let lvlIdx=0,lvl,board,moves,targetOrder,globalBest=null,catShown=false;
const bestScores=new Array(8).fill(null); // best moves per level
let cumulativeMoves=0; // suma de movimientos de todos los niveles
let cumulativeMovesAtLevelStart=0; // movimientos acumulados al inicio del nivel actual
let totalMovesAtLevel8=0; // movimientos acumulados cuando se alcanza nivel 8
let wowModeActive=false; // si ya mostró "WOW"
let gameStarted=false; // controla si es la primera vez que arranca
let levelBtnClicks=0,levelBtnTimer=null; // truco debug NPC

const svg=(key,s)=>`<img src="assets/Images/pieces/${key}.png" style="display:block;width:100%;height:100%;object-fit:contain;">`;

function bW(){return Math.min(window.innerWidth-16, 480);}
function MUSIC_H(){return 120;}
function GRID_SZ(){
  const available = window.innerHeight - MUSIC_H() - 8*2 - 6*2;
  const maxFromH = Math.floor(available * 0.55); // grid takes max 55% of remaining height
  const maxFromW = bW();
  return Math.min(maxFromH, maxFromW);
}
function cPx(){
  const s = GRID_SZ();
  return Math.floor((s - 3*(SZ-1)) / SZ);
}
function tPx(){
  // model box gets remaining height after music(120) + buttons(~52) + grid + padding/gaps
  const available = window.innerHeight - MUSIC_H() - GRID_SZ() - 52 - 8*2 - 6*4;
  const fromH = Math.floor((available - 3*(SZ-1)) / SZ);
  const fromW = Math.floor((bW() * 0.55 - 3*(SZ-1)) / SZ);
  return Math.max(18, Math.min(fromH, fromW));
}

function generateNewTarget(){
  // Generar el orden del objetivo según la dificultad del nivel
  let baseIcons;
  
  if(lvlIdx===0){ // Nivel 1: 4 corazones + 4 iconos diferentes
    baseIcons = [3, 3, 3, 3, 0, 1, 2, 4]; // 4 corazones + luna, fuego, estrella, unión
  } else if(lvlIdx===1){ // Nivel 2: 3 corazones + 5 iconos diferentes
    baseIcons = [3, 3, 3, 0, 1, 2, 4, 5]; // 3 corazones + luna, fuego, estrella, unión, planeta
  } else if(lvlIdx===2){ // Nivel 3: 2 corazones + 6 iconos diferentes
    baseIcons = [3, 3, 0, 1, 2, 4, 5, 6]; // 2 corazones + luna, fuego, estrella, unión, planeta, árbol
  } else {
    // Niveles 4-8: todos los iconos diferentes (8 fichas, la última es -1 vacía)
    baseIcons = [...Array(SZ*SZ-1).keys()];
  }
  
  targetOrder = baseIcons;
  
  // Mezclar targetOrder con Fisher-Yates shuffle
  for(let i=targetOrder.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [targetOrder[i],targetOrder[j]]=[targetOrder[j],targetOrder[i]];
  }
  board=[...targetOrder,-1]; // board empieza resuelto con el orden del objetivo
}

function init(idx){
  lvl=LEVELS[Math.min(idx,7)]; moves=0;
  lvlIdx=idx;
  catShown=false;
  cumulativeMovesAtLevelStart=cumulativeMoves;
  // Guardar movimientos acumulados cuando se alcanza el nivel 8 (índice 7)
  if(lvlIdx===7 && totalMovesAtLevel8===0){
    totalMovesAtLevel8=cumulativeMoves;
  }
  document.getElementById('mv-model').textContent=0;
  document.getElementById('level-text').textContent='LEVEL '+(idx+1);
  generateNewTarget();
  applyLevelTheme();
  resize(); shuffle(true);
  if(!gameStarted){ gameStarted=true; }
  else if(lvlIdx===5){ showGhost(); }
}

function resize(){
  const gs=GRID_SZ();
  const gsStr=gs+'px';
  document.getElementById('box-music').style.width=gsStr;
  document.getElementById('box-model').style.width=gsStr;
  document.getElementById('box-buttons').style.width=gsStr;
  const bg=document.getElementById('box-grid');
  bg.style.width=gsStr; bg.style.height=gsStr;
  renderTarget(); render();
}

function renderTarget(){
  const tg=document.getElementById('target-grid'),tp=tPx(),tpx=tp+'px';
  tg.style.gridTemplateColumns=`repeat(${SZ},${tpx})`;
  tg.innerHTML='';
  // Mostrar el objetivo usando el orden aleatorio generado en init
  for(let i=0;i<SZ*SZ;i++){
    const d=document.createElement('div');
    d.style.width=tpx; d.style.height=tpx;
    if(i<SZ*SZ-1){
      d.className='tc';
      d.innerHTML=svg(ICON_KEYS[targetOrder[i]],tp*0.65);
    } else {
      d.className='tc et';
    }
    tg.appendChild(d);
  }
}

function render(){
  const g=document.getElementById('grid'),cp=cPx(),cpx=cp+'px';
  g.style.gridTemplateColumns=`repeat(${SZ},${cpx})`;
  g.innerHTML='';
  board.forEach((v,i)=>{
    const d=document.createElement('div');
    d.style.width=cpx; d.style.height=cpx;
    if(v===-1){d.className='cell';}
    else{
      d.className='cell tile';
      d.innerHTML=svg(ICON_KEYS[v],cp*0.65);
      (()=>{
        const idx=i;
        d.addEventListener('click',()=>move(idx));
        d.addEventListener('touchend',(e)=>{e.preventDefault();move(idx);},{passive:false});
      })();
    }
    g.appendChild(d);
  });
}

function updateRightMarker(){
  const marker = document.getElementById('best-model');
  if(lvlIdx<=7){
    if(cumulativeMoves>=10000 && !wowModeActive){
      wowModeActive=true;
      marker.textContent='WOW!';
    } else if(cumulativeMoves<10000 && wowModeActive){
      wowModeActive=false;
      marker.textContent=cumulativeMoves;
    } else if(!wowModeActive){
      marker.textContent=cumulativeMoves;
    }
  }
}

function applyLevelTheme(){
  const boxModel = document.getElementById('box-model');
  const grid = document.getElementById('grid');
  const targetGrid = document.getElementById('target-grid');
  boxModel.classList.remove('level7-theme', 'level8-theme');
  grid.classList.remove('level7-theme', 'level8-theme');
  targetGrid.classList.remove('level7-theme', 'level8-theme');
  if(lvlIdx>=6){ // Niveles 7 y 8: escala de grises
    boxModel.classList.add('level8-theme');
    grid.classList.add('level8-theme');
    targetGrid.classList.add('level8-theme');
  }
}

function move(i){
  const e=board.indexOf(-1),er=~~(e/SZ),ec=e%SZ,cr=~~(i/SZ),cc=i%SZ;
  if(Math.abs(er-cr)+Math.abs(ec-cc)===1){
    if(catShown){ hideSeed(); hideGhost(); }
    [board[e],board[i]]=[board[i],board[e]];
    moves++; 
    // Actualizar el marcador de movimientos
    if(lvlIdx>=7){
      // A partir del nivel 8, mostrar movimientos acumulados congelados
      document.getElementById('mv-model').textContent=totalMovesAtLevel8;
    } else {
      // Hasta nivel 7, mostrar solo los movimientos del nivel actual
      document.getElementById('mv-model').textContent=moves;
    }
    playTile();
    if(moves%50===0){ if(lvlIdx<=4) showSeed(t('encourage_message')); else showGhost(); }
    
    // Verificar cambios de dificultad según el nivel
    if(lvlIdx>=5){ // Niveles 6, 7, 8 (índices 5, 6, 7)
      let threshold;
      if(lvlIdx===5) threshold=60; // Nivel 6: cada 60
      else if(lvlIdx===6) threshold=40; // Nivel 7: cada 40
      else threshold=20; // Nivel 8: cada 20
      if(moves%threshold===0 && moves>0){
        triggerIconSwap();
      }
    }
    
    render();
    if(won()) setTimeout(showWin,300);
    updateRightMarker();
  }
}

function triggerIconSwap(){
  const targetGrid = document.getElementById('target-grid');
  const cells = targetGrid.querySelectorAll('.tc:not(.et)'); // excluir la celda vacía
  if(cells.length===0) return;
  
  // Encontrar índice del corazón
  let heartIndex = -1;
  for(let i=0;i<targetOrder.length;i++){
    if(ICON_KEYS[targetOrder[i]]==='corazon'){
      heartIndex = i;
      break;
    }
  }
  if(heartIndex===-1) return;
  
  // Seleccionar un icono aleatorio diferente del corazón
  let randomIndex = Math.floor(Math.random()*targetOrder.length);
  while(randomIndex===heartIndex || ICON_KEYS[targetOrder[randomIndex]]==='corazon'){
    randomIndex = Math.floor(Math.random()*targetOrder.length);
  }
  
  // Intercambiar
  [targetOrder[heartIndex], targetOrder[randomIndex]] = [targetOrder[randomIndex], targetOrder[heartIndex]];
  
  // Animar parpadeo y sonido
  playAlertSound();
  const cellsToFlash = [cells[heartIndex], cells[randomIndex]];
  let flashCount = 0;
  const flashInterval = setInterval(()=>{
    cellsToFlash.forEach(cell => cell.style.opacity = flashCount%2===0 ? '0.3' : '1');
    flashCount++;
    if(flashCount>=12) { // 3 segundos de parpadeo (12 * 250ms = 3s)
      clearInterval(flashInterval);
      cellsToFlash.forEach(cell => cell.style.opacity='1');
      renderTarget();
    }
  }, 250);
}

function vMoves(){
  const e=board.indexOf(-1),r=~~(e/SZ),c=e%SZ,v=[];
  for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<SZ&&nc>=0&&nc<SZ)v.push(nr*SZ+nc);}
  return v;
}

function shuffle(s){
  if(!s){
    // Si se llama desde el botón RESET, restar movimientos del nivel actual al acumulado
    cumulativeMoves = cumulativeMovesAtLevelStart;
    wowModeActive=false; // resetear WOW
    generateNewTarget();
    renderTarget(); // actualizar el modelo visual
    moves=0;
    document.getElementById('mv-model').textContent=0;
    updateRightMarker();
  }
  for(let i=0;i<250;i++){const m=vMoves(),r=m[~~(Math.random()*m.length)],e=board.indexOf(-1);[board[e],board[r]]=[board[r],board[e]];}
  if(!s){playStartChime();}
  render();
}

function hint(){
  const cells=document.getElementById('grid').children;
  [...cells].forEach(c=>c.classList.remove('hint'));
  vMoves().forEach(i=>cells[i].classList.add('hint'));
  setTimeout(()=>[...cells].forEach(c=>c.classList.remove('hint')),1200);
}

function won(){
  // Verificar si el board coincide con el targetOrder
  for(let i=0;i<board.length-1;i++){
    if(board[i]!==targetOrder[i])return false;
  }
  return board.at(-1)===-1;
}

function showWin(){

  if(cumulativeMoves>=10000) wowModeActive=true;
  // update best score per level
  if(bestScores[lvlIdx]===null || moves < bestScores[lvlIdx]) bestScores[lvlIdx]=moves;

  if(globalBest===null || moves < globalBest) {

    document.getElementById('best-model').textContent=globalBest;

function next(){
  document.getElementById('win').classList.remove('on');

  ['box-music','box-model','box-buttons','box-grid'].forEach(id=>document.getElementById(id).style.display='');
  if(lvlIdx<7){lvlIdx++;init(lvlIdx);}
  else{init(0);lvlIdx=0;} // infinite mode: loop back
  playStartChime();
}
function reset(){
  document.getElementById('win').classList.remove('on');

  ['box-music','box-model','box-buttons','box-grid'].forEach(id=>document.getElementById(id).style.display='');

  generateNewTarget();
  moves=0;

  hideSeed(); hideGhost();
  document.getElementById('mv-model').textContent=0;
  resize(); // esto llama a renderTarget() y render()

}

const AC = new (window.AudioContext || window.webkitAudioContext)();

function resumeAC(){
  try{ if(AC.state==='suspended') AC.resume(); } catch(e){}
}

function makeOsc(type, dest){
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(dest);
  o.type=type;
  o.onended=()=>{ try{ o.disconnect(); g.disconnect(); } catch(e){} };
  return {o, g};
}

function playTile(){
  try{
    resumeAC();
    const {o,g}=makeOsc('sine', AC.destination);
    o.frequency.setValueAtTime(880, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(660, AC.currentTime+0.08);
    g.gain.setValueAtTime(0.18, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.12);
    o.start(); o.stop(AC.currentTime+0.12);
  } catch(e){}
}

function playBtn(){
  try{
    resumeAC();
    const {o,g}=makeOsc('sine', AC.destination);
    o.frequency.setValueAtTime(440, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(880, AC.currentTime+0.12);
    g.gain.setValueAtTime(0.12, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.18);
    o.start(); o.stop(AC.currentTime+0.18);
  } catch(e){}
}

function playStartChime(){
  try{
    resumeAC();
    // Arabic/exotic pixel melody — uses augmented 2nd intervals (D Eb F# G A Bb C# D)
    const melody=[294, 311, 370, 392, 440, 466, 554, 587];
    const times= [0, 0.09, 0.17, 0.24, 0.31, 0.40, 0.49, 0.57];
    melody.forEach((freq,i)=>{
      const {o,g}=makeOsc('square', AC.destination);
      o.frequency.setValueAtTime(freq, AC.currentTime);
      const t=AC.currentTime+times[i];
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.07,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
      o.start(t); o.stop(t+0.15);
    });
  } catch(e){}
}

function playCatSound(){
  if(lvlIdx>=5){
    playGhostSound();
  } else {
    try{
      resumeAC();
      // Sonido de cascabel/campana (notas múltiples)
      const notes = [800, 1200, 800];
      const times = [0, 0.1, 0.2];
      notes.forEach((freq, i) => {
        const {o,g}=makeOsc('sine', AC.destination);
        const t = AC.currentTime + times[i];
        o.frequency.setValueAtTime(freq, t);
        o.frequency.exponentialRampToValueAtTime(freq * 0.7, t + 0.08);
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        o.start(t); o.stop(t + 0.12);
      });
    } catch(e){}
  }
}

function playAlertSound(){
  try{
    resumeAC();
    // Sonido de alerta corto para intercambio de iconos
    const {o,g}=makeOsc('sine', AC.destination);
    o.frequency.setValueAtTime(600, AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(400, AC.currentTime+0.15);
    g.gain.setValueAtTime(0.2, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.18);
    o.start(); o.stop(AC.currentTime+0.18);
  } catch(e){}
}

function playGhostSound(){
  try{
    resumeAC();
    // Sonido de fantasma - efecto fantasmal más largo
    const g=AC.createGain();
    g.connect(AC.destination);
    g.gain.setValueAtTime(0.1, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.5);
    [200, 150].forEach((baseFreq, idx)=>{
      const o=AC.createOscillator();
      o.connect(g);
      o.type='sine';
      o.frequency.setValueAtTime(baseFreq, AC.currentTime);
      o.frequency.exponentialRampToValueAtTime(baseFreq+100, AC.currentTime+0.4);
      o.onended=()=>{ try{ o.disconnect(); } catch(e){} };
      o.start(); o.stop(AC.currentTime+0.5);
    });
    setTimeout(()=>{ try{ g.disconnect(); } catch(e){} }, 600);
  } catch(e){}
}

<canvas id="bg" style="display:none;"></canvas>
<script>
(function(){
  const c=document.getElementById('bg');
  const ctx=c.getContext('2d');
  const px=22;
const fills=['#a8e0e6','#a8e0e6','#a8e0e6','#a8e0e6','#089ad8','#089ad8','#8661a9','#8661a9'];
  const accents=['#ba67a6','#8661a9','#089ad8','#d48fc4'];
  const darks=['#089ad8','#06607a','#06607a','#8661a9'];
  const rnd=(a)=>a[Math.floor(Math.random()*a.length)];

  function draw(){
    c.width=window.innerWidth;
    c.height=window.innerHeight;
    const cols=Math.ceil(c.width/px)+3;
    const rows=Math.ceil(c.height/px)+3;
    // seed-like: use fixed offsets so pattern is stable
    let s=0;
    function sr(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;}

    const used=Array.from({length:rows},()=>new Array(cols).fill(false));
    for(let r=0;r<rows;r++){
      for(let c2=0;c2<cols;c2++){
        if(used[r][c2])continue;
        let w=sr()<0.4?1:sr()<0.6?2:3;
        let h=sr()<0.4?1:sr()<0.6?2:3;
        w=Math.min(w,cols-c2);
        h=Math.min(h,rows-r);
        let ok=true;
        for(let dr=0;dr<h&&ok;dr++)for(let dc=0;dc<w&&ok;dc++)if(used[r+dr][c2+dc])ok=false;
        if(!ok){w=1;h=1;}
        for(let dr=0;dr<h;dr++)for(let dc=0;dc<w;dc++)used[r+dr][c2+dc]=true;

        const x=c2*px,y=r*px,bw=w*px,bh=h*px;
        const raised=sr()>0.3;
        ctx.fillStyle=fills[Math.floor(sr()*fills.length)];
        ctx.fillRect(x,y,bw,bh);
        const hl=accents[Math.floor(sr()*accents.length)];
        const sh=darks[Math.floor(sr()*darks.length)];
        ctx.fillStyle=raised?hl:sh;
        ctx.fillRect(x,y,bw,3);ctx.fillRect(x,y,3,bh);
        ctx.fillStyle=raised?sh:hl;
        ctx.fillRect(x,y+bh-3,bw,3);ctx.fillRect(x+bw-3,y,3,bh);
      }
    }
  }
  draw();
  window.addEventListener('resize',draw);
})();
